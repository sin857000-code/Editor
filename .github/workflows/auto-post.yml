name: Auto Post Transfer News

on:
  schedule:
    # 9:00 KST (00:00 UTC), 15:00 KST (06:00 UTC), 21:00 KST (12:00 UTC)
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install anthropic playwright

      - name: Install Chromium for Playwright
        run: playwright install chromium --with-deps

      - name: Generate carousel images and blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GITHUB_REPO: sin857000-code/Editor
          GITHUB_BRANCH: main
        run: python scripts/fetch_transfers.py

      # Push first so carousel images are publicly accessible via raw.githubusercontent.com
      - name: Commit and push images + posts + queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/_posts/ blog/assets/images/ scripts/.seen_ids.json scripts/.instagram_queue.json
          git diff --cached --quiet && echo "No new posts" && exit 0
          COUNT=$(git diff --cached --name-only | grep "_posts/" | wc -l)
          git commit -m "chore: auto-post ${COUNT}개 이적 카드뉴스 ($(date +'%Y-%m-%d %H:%M KST' -d '+9 hours'))"
          git push origin HEAD

      # Now that images are on GitHub, post to Instagram using raw URLs
      - name: Post carousels to Instagram
        run: python scripts/post_instagram_carousel.py

      - name: Commit cleared queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/.instagram_queue.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: clear instagram queue"
          git push origin HEAD
